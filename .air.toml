root = "."
# Build OUTSIDE the shared source mount so multiple node containers don't clobber
# each other's binaries (each container has its own /tmp).
tmp_dir = "/tmp/air"

[build]
  cmd = "go build -buildvcs=false -o /tmp/air/safesplit-node ."
  bin = "/tmp/air/safesplit-node"
  include_ext = ["go", "mod"]
  exclude_dir = ["tmp", "deployments"]
  delay = 500
  stop_on_error = true
  poll = false

[misc]
  clean_on_exit = true
